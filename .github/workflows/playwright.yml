# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E Tests
#
# PURPOSE:
#   Runs the full Playwright test suite against the production app on every
#   push to main. Uploads the HTML report as a downloadable artifact.
#
# TRIGGER:
#   - push to main branch
#   - manual dispatch from the GitHub Actions UI
#
# NO SECRETS REQUIRED:
#   Tests run against https://eventhub.rahulshettyacademy.com (configured in
#   playwright.config.ts). No local server or database setup is needed.
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '21.7.1'

jobs:
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Install dependencies ──────────────────────────────────────────────────
      # Root package.json contains @playwright/test — a single npm ci is enough.
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browsers ───────────────────────────────────────────
      # Only Chromium is needed (playwright.config.ts defines one project).
      # --with-deps installs the OS-level libraries Chromium requires on Ubuntu.
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Run all tests ─────────────────────────────────────────────────────────
      # Tests target https://eventhub.rahulshettyacademy.com (set in config).
      # CI=true activates doubled timeouts and 1 retry in playwright.config.ts.
      # `if: always()` on the upload step ensures the report is saved even when
      # tests fail — so failures are always diagnosable from the artifact.
      - name: Run Playwright tests
        run: npm run test
        env:
          CI: true

      # ── Upload HTML report ────────────────────────────────────────────────────
      # Report is generated by Playwright's built-in HTML reporter.
      # `if: always()` runs this step regardless of test pass/fail.
      # Run number is included in the artifact name so each run is distinct.
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
